            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: rgba(0, 0, 0, 0.6);

            margin-bottom: 10px;
            color: #ffd700;
        }

        h2 {
            margin-bottom: 20px;
            font-weight: normal;
            color: #ddd;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        ul li {
            background: #ffffff20;
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
        }

        footer {
            margin-top: 20px;
            font-size: 14px;
